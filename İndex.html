padding:20px;

}

}

.name{

font-weight:800;

}

.blood{

linear-gradient(135deg,#d60000,#8a0000);
padding:24px;
border-radius:24px;
text-align:center;

box-shadow:0 10px 25px rgba(255,0,0,.18);
}

.blood-label{
font-size:13px;
opacity:.85;
margin-bottom:8px;
}

.blood-group{
font-size:42px;
font-weight:900;
}

.info-card{
background:#202020;
border:1px solid #2f2f2f;
border-radius:22px;
padding:18px;
margin-bottom:14px;
}

.label{
font-size:13px;
color:#9c9c9c;
margin-bottom:8px;
}

.value{
font-size:24px;
font-weight:bold;
}

.call-box{
margin-top:8px;
}

.call-btn{
display:block;
width:100%;
text-align:center;
background:linear-gradient(135deg,#ff2020,#b00000);
padding:18px;
border-radius:18px;
text-decoration:none;
font-size:22px;
font-weight:bold;
color:white;
margin-top:12px;
box-shadow:0 8px 20px rgba(255,0,0,.18);
}

.footer{
margin-top:20px;
text-align:center;
color:#777;
font-size:13px;
line-height:1.6;
}
</style>
</head>
